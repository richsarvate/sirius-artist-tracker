# HTTPS server block (handles real traffic)
server {
    listen 443 ssl; # managed by Certbot
    server_name xm.setupcomedy.com;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /home/ec2-user/sirius-artist-tracker/frontend/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # 👇 NEW: reverse proxy for API
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    ssl_certificate /etc/letsencrypt/live/xm.setupcomedy.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/xm.setupcomedy.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP server block (just redirects to HTTPS)
server {
    listen 80;
    server_name xm.setupcomedy.com;

    if ($host = xm.setupcomedy.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    return 404; # managed by Certbot
}

