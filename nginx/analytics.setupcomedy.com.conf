# Nginx configuration for analytics.setupcomedy.com
# Add this to your existing nginx configuration

server {
    listen 80;
    server_name analytics.setupcomedy.com;
    
    # Redirect HTTP to HTTPS (if you have SSL setup)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name analytics.setupcomedy.com;
    
    # SSL configuration - Let's Encrypt certificates
    ssl_certificate /etc/letsencrypt/live/analytics.setupcomedy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.setupcomedy.com/privkey.pem;
    
    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Proxy to the analytics dashboard
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed for future features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Optional: Static file handling (CSS, JS, images)
    location /static/ {
        alias /home/ec2-user/GuestListScripts/frontend/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Error and access logs
    error_log /var/log/nginx/analytics_error.log;
    access_log /var/log/nginx/analytics_access.log;
}
